name: Build and deploy Node.js app to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'npm'

      - name: npm install, build
        run: |
          npm install
          npm run build

      - name: Prepare deployment package
        run: |
          # Create deployment package directory
          mkdir -p deployment-package
          # Copy all files from standalone build (includes server.js, package.json, node_modules, .next)
          cp -r .next/standalone/* deployment-package/
          # Copy static assets to deployment package
          cp -r public deployment-package/
          cp -r .next/static deployment-package/.next/
          # Copy Azure configuration files
          cp web.config deployment-package/
          cp startup.cmd deployment-package/

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v3
        with:
          name: node-app
          path: deployment-package

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v3
        with:
          name: node-app

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'Sydneymarthoma-nextjs'  # Your Azure App Service name
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
          package: .