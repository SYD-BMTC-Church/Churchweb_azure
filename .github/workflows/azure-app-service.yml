name: Build and deploy Node.js app to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: npm install and build
        run: |
          npm install
          npm run build

      - name: Prepare standalone deployment
        run: |
          # Create deployment directory
          mkdir -p ./deployment
          # Copy ALL standalone files (includes server.js, package.json, .next/, node_modules/)
          cp -r .next/standalone/* ./deployment/
          # Copy static files to the correct location in standalone .next
          cp -r .next/static ./deployment/.next/static
          # Copy public files
          cp -r public ./deployment/public
          # Copy web.config for Azure
          cp web.config ./deployment/
          # Fix the package.json to use the correct start command
          sed -i 's/"start": "next start"/"start": "node server.js"/' ./deployment/package.json
          # Verify the structure
          echo "=== Deployment structure ==="
          ls -la ./deployment/
          echo "=== .next directory ==="
          ls -la ./deployment/.next/
          echo "=== Static files ==="
          ls -la ./deployment/.next/static/ || echo "No static files found"
          echo "=== Package.json start script ==="
          grep '"start"' ./deployment/package.json

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: ./deployment

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'Sydneymarthoma-nextjs'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_32C20C051A924DD195620D4C41D13AC9 }}
          package: .