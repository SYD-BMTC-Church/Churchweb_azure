name: Build and deploy Node.js app to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: npm install and build
        run: |
          npm install
          npm run build

      - name: Prepare deployment package
        run: |
          # Create deployment directory
          mkdir -p ./deployment
          # Copy source files and built application
          cp -r .next ./deployment/
          cp -r public ./deployment/
          cp -r src ./deployment/
          cp package*.json ./deployment/
          cp next.config.ts ./deployment/
          cp tsconfig.json ./deployment/
          cp tailwind.config.ts ./deployment/
          cp postcss.config.mjs ./deployment/
          cp components.json ./deployment/
          cp web.config ./deployment/
          cp app.js ./deployment/
          # Copy environment template if it exists (Azure will use environment variables from portal)
          if [ -f ".env.local" ]; then
            cp .env.local ./deployment/
            echo "Copied .env.local template"
          else
            echo "No .env.local found - Azure will use portal environment variables"
          fi
          # Verify the structure
          echo "=== Deployment structure ==="
          ls -la ./deployment/
          echo "=== .next directory ==="
          ls -la ./deployment/.next/
          echo "=== Package.json content ==="
          cat ./deployment/package.json
          echo "=== App.js exists ==="
          ls -la ./deployment/app.js

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: ./deployment

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'Sydneymarthoma-nextjs'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_32C20C051A924DD195620D4C41D13AC9 }}
          package: .