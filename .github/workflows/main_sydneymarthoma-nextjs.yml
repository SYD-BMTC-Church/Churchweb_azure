# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - Sydneymarthoma-nextjs

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: npm install and build
        run: |
          npm install
          npm run build

      - name: Prepare standalone deployment
        run: |
          # Create deployment directory
          mkdir -p ./deployment
          # Copy standalone server files
          cp -r .next/standalone/* ./deployment/
          # Create .next directory in deployment
          mkdir -p ./deployment/.next
          # Copy static files
          cp -r .next/static ./deployment/.next/static
          # Copy public files
          cp -r public ./deployment/public
          # Copy web.config for Azure
          cp web.config ./deployment/
          # Create a simple package.json for the standalone deployment
          echo '{"name":"sydneymarthomachurch","version":"0.1.0","scripts":{"start":"node server.js"}}' > ./deployment/package.json
          # List contents to verify
          ls -la ./deployment/
        
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: ./deployment

  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'Sydneymarthoma-nextjs'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_32C20C051A924DD195620D4C41D13AC9 }}